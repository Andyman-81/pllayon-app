<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta name="description" content="Pllay On Edge — Athlete Edition — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Pllay On Edge — Athlete Edition" />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pllay On Edge — Athlete Edition" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app-loader" style="
      position: fixed;
      inset: 0;
      background: #0F172A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      font-family: Arial, sans-serif;
      transition: opacity 0.3s;
    ">
      <div style="
        font-size: 28px;
        font-weight: 800;
        color: #10AC6E;
        letter-spacing: .06em;
        text-transform: uppercase;
      ">PLLAY ON</div>
      <div style="
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,.1);
        border-top: 3px solid #10AC6E;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      "></div>
      <div style="
        font-size: 11px;
        letter-spacing: .16em;
        text-transform: uppercase;
        color: rgba(255,255,255,.3);
      ">LOADING...</div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
