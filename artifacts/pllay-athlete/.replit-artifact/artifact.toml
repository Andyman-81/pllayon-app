kind = "web"
previewPath = "/"
title = "Pllay On Edge — Athlete Edition"
version = "1.0.0"
id = "artifacts/pllay-athlete"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20521

[services.development]
run = "pnpm --filter @workspace/pllay-athlete run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pllay-athlete", "run", "build" ]
publicDir = "artifacts/pllay-athlete/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20521"
BASE_PATH = "/"
